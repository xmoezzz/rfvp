[package]
name = "rfvp"
version = "0.3.0"
edition = "2021"
homepage = "https://github.com/xmoezzz/rfvp"
description = "A Non-Official Rust cross-platform implementation of the FVP engine"
repository = "https://github.com/xmoezzz/rfvp"
readme = "../../README.md"
license = "MPL-2.0"

# exclude = [
#     "src/subsystem/resources/fonts/*"
# ]

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "rfvp"
path = "src/lib.rs"
crate-type = ["cdylib", "staticlib", "rlib"]

[[bin]]
name = "rfvp"
path = "src/main.rs"

[dependencies]
anyhow = { version = "1.0.79", features = ["backtrace"] }
encoding_rs = "0.8.33"
log = { version = "0.4.20", features = ["serde"] }
serde = { version = "1.0.196", features = ["derive"]}
serde_json = "1.0.113"
bincode = "1.3.3"
twofloat = "0.7.0"
winit = {version = "0.30.5", features = ["rwh_05"]}
wgpu = { version = "0.19.1", features = ["spirv"] }
glob = "0.3.1"
atomic_refcell = "0.1.13"
hecs = "0.10.4"
image = "0.24.9"
bytes = "1.6.0"
bytemuck = { version = "1.14.3", features = ["derive"] }
ultraviolet = "0.9.2"
futures = "0.3.30"
fern = { version = "0.6.2", features = ["colored"] }
chrono = "0.4.35"

flate2 = "1.0.28"
byteorder = "1.5.0"
rand = { version = "0.8.5", features = ["small_rng"] }
lazy_static = "1.4.0"
fontdue = "0.9.3"
ab_glyph = "0.2.29"
mp4 = "0.14.0"
video-sys = { version = "0.1.0", optional = true }

env_logger = "0.11.3"
egui = "0.27.2"
# eframe = "0.27.2"
bevy_utils = "0.13.2"
glam = { version = "0.27.0", features = [
    # "scalar-math" disables the 16-byte alignment requirement for some types
    # this is required for bytemuck to work
    "bytemuck", "scalar-math"
] }
enum-map = "2.7.3"
itertools = "0.12.1"
petitset = "0.2.1"
tracing = "0.1.37"
kira = "0.10.8"

uuid = { version = "1.19.0", features = ["js"] }

wmv-decoder = { path = "../na_wmv_player", optional = true }
na_mpeg2_decoder = { path = "../na_mpeg2_decoder", optional = true }
crossbeam-channel = "0.5"

symphonia = { version = "0.5", default-features = false, features = ["aac", "isomp4"], optional = true }

ico = "0.3"
riff = "2.0.0"

pollster = "0.4.0"

bitflags = "2.9.4"
regex = "1.11.2"

# dhat = "0.3"

[features]
# Keep native movie support enabled by default for backward compatibility.
default = ["mp4", "native-video"]

# WebAssembly build entry. Use this with `--no-default-features --features wasm`.
wasm = ["native-video"]

# Native WMV/MPEG movie backends. This is disabled for wasm builds.
native-video = ["dep:wmv-decoder", "dep:na_mpeg2_decoder"]

# MP4 movie playback backend (video-sys + symphonia for AAC audio).
mp4 = ["dep:video-sys", "dep:symphonia"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
rodio = "0.17.3"
directories = "6.0.0"
uuid = "1.19.0"

[target.'cfg(target_arch = "wasm32")'.dependencies]
web-time = "1.1"
wasm-bindgen = "0.2.95"
wasm-bindgen-futures = "0.4.45"
js-sys = "0.3.72"
console_error_panic_hook = "0.1.7"
getrandom = { version = "0.2", features = ["js"] }
cpal = { version = "0.15.3", features = ["wasm-bindgen"] }
web-sys = { version = "0.3.72", features = [
    "Window",
    "Document",
    "Element",
    "HtmlCanvasElement",
    "HtmlInputElement",
    "File",
    "FileList",
    "Blob",
    "console",
] }
wgpu = { version = "0.19.1", features = ["webgl"] }

[target.'cfg(target_os = "android")'.dependencies]
android-activity = { version = "0.6", features = ["game-activity"] }
ndk-context = "0.1.1"

[target.'cfg(any(target_os = "windows", target_os = "linux", target_os = "macos"))'.dependencies]
egui-wgpu = "0.27.2"

[profile.test]
inherits = "release"
