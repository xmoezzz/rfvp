name: Build Artifacts

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-A static_mut_refs"
  RFVP_CARGO_PKG: rfvp

jobs:
  meta:
    name: Read rfvp version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from crates/rfvp/Cargo.toml
        id: ver
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import tomllib
          from pathlib import Path

          data = tomllib.loads(
              Path("crates/rfvp/Cargo.toml").read_text(encoding="utf-8")
          )
          print(f"version={data['package']['version']}")
          PY

  linux_x86_64:
    name: linux-x86_64 (ubuntu-22.04)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps (GStreamer, audio)
        run: |
          sudo apt-get update
          sudo apt-get remove -y libunwind-14-dev libc++-14-dev libc++-dev || true
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            libgstrtspserver-1.0-dev \
            libges-1.0-dev

      - name: Build (release)
        run: |
          cargo build --release -p "${RFVP_CARGO_PKG}" --verbose

      - name: Package artifact (tar.gz)
        run: |
          mkdir -p dist/linux
          BIN="target/release/${RFVP_CARGO_PKG}"
          test -f "$BIN"
          tar -C "target/release" -czf "dist/linux/${RFVP_CARGO_PKG}-linux-x86_64.tar.gz" "${RFVP_CARGO_PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-linux-x86_64
          path: dist/linux/rfvp-linux-x86_64.tar.gz
          if-no-files-found: error

  linux_aarch64:
    name: linux-aarch64 (ubuntu-22.04-arm)
    runs-on: ubuntu-22.04-arm

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install system deps (GStreamer, audio)
        run: |
          sudo apt-get update
          sudo apt-get remove -y libunwind-14-dev libc++-14-dev libc++-dev || true
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            libgstrtspserver-1.0-dev \
            libges-1.0-dev

      - name: Build (release)
        run: |
          cargo build --release -p "${RFVP_CARGO_PKG}" --verbose

      - name: Package artifact (tar.gz)
        run: |
          mkdir -p dist/linux
          BIN="target/release/${RFVP_CARGO_PKG}"
          test -f "$BIN"
          tar -C "target/release" -czf "dist/linux/${RFVP_CARGO_PKG}-linux-aarch64.tar.gz" "${RFVP_CARGO_PKG}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-linux-aarch64
          path: dist/linux/rfvp-linux-aarch64.tar.gz
          if-no-files-found: error


  freebsd:
    name: freebsd-${{ matrix.artifact_arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            artifact_arch: x86_64
            runner: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build FreeBSD artifact
        uses: vmactions/freebsd-vm@v1
        with:
          release: "14.4"
          arch: ${{ matrix.arch }}
          usesh: true
          sync: rsync
          copyback: true
          envs: 'CARGO_TERM_COLOR RUSTFLAGS RFVP_CARGO_PKG'
          prepare: |
            set -e
            pkg update
            pkg install -y \
              bash \
              git \
              curl \
              rust \
              pkgconf \
              cmake \
              ninja \
              gmake \
              llvm19 \
              alsa-lib \
              gstreamer1 \
              gstreamer1-plugins \
              gstreamer1-plugins-good \
              gstreamer1-plugins-bad \
              gstreamer1-plugins-ugly \
              gstreamer1-libav \
              libX11 \
              libXcursor \
              libXi \
              libXrandr \
              libXinerama \
              libxcb \
              wayland \
              libxkbcommon \
              vulkan-loader
          run: |
            set -e
            freebsd-version
            uname -a
            rustc -Vv
            cargo -V
            cc --version
            clang --version || true
            pkgconf --version
            pkgconf --exists alsa
            pkgconf --modversion alsa
            pkg info rust
            pkg info llvm19 || true
            pkg info alsa-lib || true

            cargo build --release -p "${RFVP_CARGO_PKG}" --verbose

            mkdir -p dist/freebsd
            BIN="target/release/${RFVP_CARGO_PKG}"
            test -f "${BIN}"
            tar -C "target/release" -czf "dist/freebsd/${RFVP_CARGO_PKG}-freebsd-${{ matrix.artifact_arch }}.tar.gz" "${RFVP_CARGO_PKG}"

      - name: Upload FreeBSD artifact
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-freebsd-${{ matrix.artifact_arch }}
          path: dist/freebsd/rfvp-freebsd-${{ matrix.artifact_arch }}.tar.gz
          if-no-files-found: error

  macos:
    name: macos (dmg only)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          brew install xcodegen

      - name: Build macOS .app (script)
        run: |
          chmod +x platform/scripts/package_macos_app.sh
          ./platform/scripts/package_macos_app.sh || true

      - name: Build macOS .dmg (script)
        run: |
          chmod +x platform/scripts/package_macos_dmg.sh
          ./platform/scripts/package_macos_dmg.sh || true

      - name: Verify DMG output
        run: |
          test -f dist/macos/RFVP.dmg

      - name: Upload artifact (DMG only)
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-macos
          path: dist/macos/RFVP.dmg
          if-no-files-found: error

  ios:
    name: ios (ipa only)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode (latest stable)
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install build tools
        run: |
          brew install xcodegen

      - name: Build iOS artifacts (script)
        run: |
          set -euo pipefail
          export COPYFILE_DISABLE=1

          ./platform/scripts/build_ios_xcframework.sh

          if [[ -f platform/scripts/package_ios_altstore_ipa.sh ]]; then
            chmod +x platform/scripts/package_ios_altstore_ipa.sh
            ./platform/scripts/package_ios_altstore_ipa.sh
          else
            echo "ERROR: No iOS packaging script found. Expected platform/scripts/package_ios_altstore_ipa.sh" >&2
            exit 1
          fi

      - name: Collect IPA only
        run: |
          set -euo pipefail
          mkdir -p dist/ios_ci

          IPA_PATH="$(find dist -maxdepth 4 -type f -name 'RFVPLauncher.ipa' | head -n 1)"
          test -n "$IPA_PATH"
          cp -v "$IPA_PATH" dist/ios_ci/RFVPLauncher.ipa

      - name: Upload artifact (IPA only)
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-ios
          path: dist/ios_ci/RFVPLauncher.ipa
          if-no-files-found: error

  windows:
    name: windows (x64 + arm64)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Add targets
        shell: cmd
        run: |
          rustup target add x86_64-pc-windows-msvc
          rustup target add aarch64-pc-windows-msvc

      - name: Build x64 (script)
        shell: cmd
        run: |
          call platform\scripts\build_windows_msvc.cmd x86_64
          exit /b 0

      - name: Verify x64 output
        shell: cmd
        run: |
          if not exist target\x86_64-pc-windows-msvc\release\%RFVP_CARGO_PKG%.exe exit /b 1

      - name: Build arm64 (script)
        shell: cmd
        run: |
          call platform\scripts\build_windows_msvc.cmd arm64
          exit /b 0

      - name: Verify arm64 output
        shell: cmd
        run: |
          if not exist target\aarch64-pc-windows-msvc\release\%RFVP_CARGO_PKG%.exe exit /b 1

      - name: Collect Windows outputs
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path dist/windows | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\${env:RFVP_CARGO_PKG}.exe" "dist/windows/rfvp.exe"
          Copy-Item "target\aarch64-pc-windows-msvc\release\${env:RFVP_CARGO_PKG}.exe" "dist/windows/rfvp_arm64.exe"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-windows
          path: |
            dist/windows/rfvp.exe
            dist/windows/rfvp_arm64.exe
          if-no-files-found: error

  android:
    name: android
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java (Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Setup Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android components (platform/ndk)
        run: |
          set -euo pipefail
          sdkmanager --version

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "$GITHUB_ENV"

          sdkmanager --licenses < /dev/null || true

          sdkmanager \
            "platform-tools" \
            "platforms;android-28" \
            "build-tools;34.0.0" \
            "ndk;26.3.11579264"

          echo "Installed NDKs:"
          ls -la "${ANDROID_SDK_ROOT}/ndk" || true

      - name: Build Android APK (script)
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_HOME: ${{ env.ANDROID_SDK_ROOT }}/ndk/26.3.11579264
          VARIANT: release
          ABIS: "arm64-v8a x86_64"
          ANDROID_PLATFORM: "28"
        run: |
          set -euo pipefail

          if [[ -f scripts/android/build_android_apk.sh ]]; then
            chmod +x scripts/android/build_android_apk.sh
            ./scripts/android/build_android_apk.sh
          elif [[ -f platform/scripts/package_android_apk.sh ]]; then
            chmod +x platform/scripts/package_android_apk.sh
            ./platform/scripts/package_android_apk.sh
          else
            echo "ERROR: No Android packaging script found. Expected scripts/android/build_android_apk.sh or platform/scripts/package_android_apk.sh" >&2
            exit 1
          fi

      - name: Collect APK only
        run: |
          set -euo pipefail
          mkdir -p dist/android_ci

          APK_PATH="$(
            {
              find platform/android -type f -name 'app-release.apk'
              find platform/android -type f -path "*/build/outputs/apk/release/*.apk"
              find platform/android/app -type f -name 'app-release.apk' -path "*/build/outputs/apk/release/*"
            } | awk '!seen[$0]++' | head -n 1
          )"

          test -n "$APK_PATH"
          cp -v "$APK_PATH" dist/android_ci/app-release.apk
          test -f dist/android_ci/app-release.apk

      - name: Sign Android APK
        shell: bash
        env:
          ANDROID_KEY_BASE64: ${{ secrets.ANDROID_KEY_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          set -euo pipefail

          test -n "${ANDROID_KEY_BASE64}"
          test -n "${ANDROID_KEY_ALIAS}"
          test -n "${ANDROID_KEY_PASSWORD}"
          test -n "${ANDROID_KEYSTORE_PASSWORD}"

          KEYSTORE="$RUNNER_TEMP/upload-keystore.jks"
          UNSIGNED_APK="dist/android_ci/app-release.apk"
          ALIGNED_APK="$RUNNER_TEMP/app-release-aligned.apk"
          SIGNED_APK="$RUNNER_TEMP/app-release-signed.apk"

          printf '%s' "${ANDROID_KEY_BASE64}" | base64 -d > "${KEYSTORE}"

          test -f "${UNSIGNED_APK}"

          "${ANDROID_HOME}/build-tools/34.0.0/zipalign" -f -p 4 \
            "${UNSIGNED_APK}" \
            "${ALIGNED_APK}"

          "${ANDROID_HOME}/build-tools/34.0.0/apksigner" sign \
            --ks "${KEYSTORE}" \
            --ks-key-alias "${ANDROID_KEY_ALIAS}" \
            --ks-pass "pass:${ANDROID_KEYSTORE_PASSWORD}" \
            --key-pass "pass:${ANDROID_KEY_PASSWORD}" \
            --out "${SIGNED_APK}" \
            "${ALIGNED_APK}"

          "${ANDROID_HOME}/build-tools/34.0.0/apksigner" verify \
            --verbose \
            --print-certs \
            "${SIGNED_APK}"

          mv -f "${SIGNED_APK}" "${UNSIGNED_APK}"

      - name: Upload artifact (APK only)
        uses: actions/upload-artifact@v4
        with:
          name: rfvp-android
          path: dist/android_ci/app-release.apk
          if-no-files-found: error

  prerelease:
    name: Publish GitHub Pre-release (non-tag pushes only)
    if: github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/')
    needs: [meta, linux_x86_64, linux_aarch64, freebsd, macos, ios, windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: rfvp-prerelease
      cancel-in-progress: true

    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: Compute short SHA
        id: vars
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Recreate pre-release from scratch
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          if gh release view pre-release >/dev/null 2>&1; then
            gh release delete pre-release --cleanup-tag -y
          fi

          NOTES="$(cat <<EOF
          Rolling pre-release from non-tag push

          Version: v${{ needs.meta.outputs.version }}
          Commit: ${{ github.sha }}
          Short SHA: ${{ steps.vars.outputs.short_sha }}
          EOF
          )"

          gh release create pre-release \
            --prerelease \
            --target "${{ github.sha }}" \
            --title "rfvp v${{ needs.meta.outputs.version }} pre-release (${{ steps.vars.outputs.short_sha }})" \
            --notes "$NOTES"

          gh release upload pre-release \
            _artifacts/rfvp-linux-x86_64/rfvp-linux-x86_64.tar.gz \
            _artifacts/rfvp-linux-aarch64/rfvp-linux-aarch64.tar.gz \
            _artifacts/rfvp-freebsd-x86_64/rfvp-freebsd-x86_64.tar.gz \
            _artifacts/rfvp-macos/RFVP.dmg \
            _artifacts/rfvp-ios/RFVPLauncher.ipa \
            _artifacts/rfvp-windows/rfvp.exe \
            _artifacts/rfvp-windows/rfvp_arm64.exe \
            _artifacts/rfvp-android/app-release.apk

  release:
    name: Publish GitHub Release (tags only)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [meta, linux_x86_64, linux_aarch64, freebsd, macos, ios, windows, android]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all workflow artifacts
        uses: actions/download-artifact@v4
        with:
          path: _artifacts

      - name: List artifacts
        run: |
          find _artifacts -maxdepth 6 -type f -print

      - name: Create Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          name: "rfvp v${{ needs.meta.outputs.version }}"
          files: |
            _artifacts/**/*
          fail_on_unmatched_files: true
