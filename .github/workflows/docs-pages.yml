name: Deploy Rust docs to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install native dependencies for docs
        run: |
          sudo apt-get update
          sudo apt-get remove -y libunwind-14-dev libc++-14-dev libc++-dev || true
          sudo apt-get install -y libunwind-dev
          sudo apt-get install -y \
            pkg-config \
            libasound2-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-libav \
            libgstrtspserver-1.0-dev \
            libges-1.0-dev

      - name: Build workspace docs
        run: cargo doc --workspace --no-deps

      - name: Install handwritten homepage
        run: cp site/index.html target/doc/index.html

      - name: Disable Jekyll processing
        run: touch target/doc/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: target/doc

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4